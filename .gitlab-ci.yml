include:
  - project: registry/gitlab-ci
    file:
    - maven.yml
    - variables.yml


variables:
  extends: .variables
  JAVA_VERSION: "17_jdk"
  MAVEN_VERSION: "3.9.4"
  ARTIFACT_PATH: "build/bin/native/releaseExecutable/ihub-runner-spy.kexe"
      
stages:          # List of stages for jobs, and their order of execution
  - build
#   - test
#   - deploy

build-job:       # This job runs in the build stage, which runs first.
  extends:
    - .maven
  stage: build
  script:
    - echo proxy=http://proxy.sberdevices.ru:31282 >> /etc/yum.conf
    - ./gradlew build 
