name: Kotlin Native Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Kotlin/Native targets using Gradle
        run: ./gradlew build -d

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # Name of the artifact (optional, default is 'artifact')
          name: spy
          # A file, directory, or wildcard pattern that describes what to upload
          path: build/bin/native/releaseExecutable/ihub-runner-spy*
          # Duration after which the artifact will expire (optional)
          retention-days: 5
